<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV_STATION</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #000; color: #4a9540; padding: 20px; font-family: monospace; }
        #video { width: 100%; border: 1px solid #4a9540; background: #111; margin-top: 10px; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
        .tv-btn { background: #000; color: #4a9540; border: 1px solid #4a9540; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
   <div class="game-card" style="border-color: #fb7299;"> <h2 style="color: #fb7299;">[ BILI_LIVE_MODULE ]</h2>
    <div class="input-group">
        <label>ROOM_ID:</label>
        <input type="number" id="roomId" placeholder="输入直播间号 (如: 6)" style="border-color: #fb7299;">
    </div>
    <div class="btn-group">
        <button class="tv-btn" style="border-color: #fb7299;" onclick="openBili()">连接直播间</button>
    </div>
    
    <div id="biliFrameContainer" style="margin-top:15px; display:none;">
        <iframe id="biliFrame" src="" style="width:100%; height:400px; border:1px solid #fb7299;"></iframe>
    </div>
</div>

<script>
function openBili() {
    const id = document.getElementById('roomId').value;
    if(!id) return alert("请输入房间号");
    const frame = document.getElementById('biliFrame');
    const container = document.getElementById('biliFrameContainer');
    
    // 使用B站移动端H5链接，这种链接最干净
    frame.src = `https://live.bilibili.com/h5/${id}`;
    container.style.display = 'block';
}
</script>
</body>
</html>
