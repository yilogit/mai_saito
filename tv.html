<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BILI_LIVE_MATRIX</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #000; color: #fb7299; font-family: monospace; padding: 15px; }
        .video-box { width: 100%; aspect-ratio: 16/9; border: 2px solid #fb7299; background: #0a0a0a; margin-bottom: 20px; }
        video { width: 100%; height: 100%; }
        
        /* 频道按钮矩阵 */
        .channel-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .channel-card {
            border: 1px solid #fb7299; background: #1a1a1a; padding: 15px;
            text-align: center; cursor: pointer; transition: 0.3s;
        }
        .channel-card:active { background: #fb7299; color: #000; }
        .room-id { font-size: 10px; opacity: 0.6; display: block; }
    </style>
</head>
<body>

    <h2>>> BILI_LIVE_STREAM_MATRIX</h2>

    <div class="video-box">
        <video id="biliPlayer" controls playsinline></video>
    </div>

    <div id="btnGrid" class="channel-grid"></div>

    <script>
        // 【维护区】你只需要在这里增加或修改房间号
        const CHANNELS = [
            { name: "CCTV-13新闻", id: "21686237" },
            { name: "24h电影轮播", id: "23053" },
            { name: "NHK国际新闻", id: "21671212" }, // 需确认房间是否在线
            { name: "个人收藏频道", id: "6" }
        ];

        const video = document.getElementById('biliPlayer');
        const hls = new Hls();

        // 核心：调用第三方解析接口 (这是目前最稳的方法)
        function playBili(roomId) {
            // 注意：这里使用了一个公开的解析代理，将B站房间号转为直链
            // 如果此代理失效，你可以更换为其他解析接口
            const apiUrl = `https://api.live.bilibili.com/xlive/web-interface/v2/index/getRoomPlayInfo?room_id=${roomId}&protocol=0,1&format=0,1,2&codec=0,1&platform=web`;
            
            // 提醒：由于跨域限制，以下仅为逻辑展示。
            // 实际上，最简单的“懒人法”是直接打开B站H5播放器，如下：
            const h5Url = `https://live.bilibili.com/h5/${roomId}`;
            
            // 为了保证【绝对能放出来】，我们直接在 video 所在的框里嵌入 H5 页面
            document.querySelector('.video-box').innerHTML = 
                `<iframe src="${h5Url}" style="width:100%;height:100%;border:none;"></iframe>`;
        }

        // 自动生成按钮块
        const grid = document.getElementById('btnGrid');
        CHANNELS.forEach(ch => {
            const div = document.createElement('div');
            div.className = 'channel-card';
            div.onclick = () => playBili(ch.id);
            div.innerHTML = `<strong>${ch.name}</strong><span class="room-id">ID: ${ch.id}</span>`;
            grid.appendChild(div);
        });
    </script>
</body>
</html>
