<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDIA_TERMINAL</title>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        body {
            background-color: #000;
            color: #4a9540;
            font-family: 'Courier New', monospace;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* 顶部信息 */
        .terminal-header {
            border-bottom: 1px dashed #4a9540;
            padding-bottom: 5px; margin-bottom: 15px;
            display: flex; justify-content: space-between; font-size: 12px;
        }

        /* 视频主体窗口 */
        .viewport {
            flex: 1;
            border: 2px solid #4a9540;
            background: #050505;
            display: flex; align-items: center; justify-content: center;
            position: relative;
            box-shadow: inset 0 0 20px rgba(74, 149, 64, 0.2);
        }

        video { width: 100%; height: 100%; object-fit: contain; display: none; }
        
        .no-signal { color: #222; font-size: 20px; font-weight: bold; }

        /* 按钮控制区：成块展示 */
        .grid-menu {
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 手机端每行2个大块 */
            gap: 10px;
        }

        .block-btn {
            background: #111;
            border: 1px solid #4a9540;
            padding: 15px 10px;
            color: #4a9540;
            text-align: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .block-btn:active { background: #4a9540; color: #000; }

        .block-btn .label { font-size: 14px; font-weight: bold; display: block; }
        .block-btn .desc { font-size: 10px; opacity: 0.6; }

        .back-home {
            text-align: center; margin-top: 15px; 
            color: #8d31c2; font-size: 12px; text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="terminal-header">
        <span>DATA_FEED: ONLINE</span>
        <span>REC_STATION_v3.0</span>
    </div>

    <div class="viewport" id="viewport">
        <div class="no-signal" id="placeholder">NO_SIGNAL</div>
        <video id="mainVideo" controls playsinline></video>
    </div>

    <div class="grid-menu">
        
        <div class="block-btn" onclick="playLocal('./music/test.mp4', 'LOCAL_FILE_01')">
            <span class="label">本地测试视频</span>
            <span class="desc">./music/test.mp4</span>
        </div>

        <div class="block-btn" onclick="playLocal('http://你的AList地址/视频.mp4', 'ALIST_STREAM')">
            <span class="label">AList 存储</span>
            <span class="desc">云端直链加载</span>
        </div>

        <div class="block-btn" onclick="window.location.href='https://m.hujiang.com/jp/'">
            <span class="label">日语学习网</span>
            <span class="desc">外部链接跳转</span>
        </div>

        <div class="block-btn" onclick="alert('模块维护中...')">
            <span class="label">待添加模块</span>
            <span class="desc">EXTEND_SLOT</span>
        </div>

    </div>

    <a href="index.html" class="back-home">[ EXIT_TO_MAIN_TERMINAL ]</a>

    <script>
        const video = document.getElementById('mainVideo');
        const placeholder = document.getElementById('placeholder');

        function playLocal(url, name) {
            // 显示视频标签，隐藏提示文字
            placeholder.style.display = 'none';
            video.style.display = 'block';
            
            // 加载并播放
            video.src = url;
            video.load();
            video.play().catch(e => {
                console.log("需要手动点击播放");
            });

            console.log("正在切换至模块: " + name);
        }
    </script>
</body>
</html>
